name: Android CI APK Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant Execute Permission for Gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --parallel --build-cache --configuration-cache
        env:
          ASR_API_KEY: ${{ secrets.ASR_API_KEY }}
          GRADLE_OPTS: -Xmx6g -Xms2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ai-ime
          path: app/build/outputs/apk/release/*.apk

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: 豆沙宝语音输入法-${{ github.ref_name }}
          files: app/build/outputs/apk/release/*.apk
          make_latest: true